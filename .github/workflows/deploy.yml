name: Deploy to VDS

on:
  push:
    branches: [main]
  workflow_dispatch:  # ручной запуск через GitHub UI

# Требует успешного прохождения CI
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: []   # CI запускается отдельно; добавь "ci" если хочешь блокировку

    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      # Запускаем деплой на сервере
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT }}
          script: |
            set -e
            cd ${{ secrets.VDS_DEPLOY_PATH }}

            # Подтягиваем свежий код
            git pull origin main

            # Пересобираем и поднимаем
            docker compose -f docker-compose.prod.yml --env-file .env build --no-cache
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans

            # Применяем миграции БД
            docker compose -f docker-compose.prod.yml --env-file .env exec -T backend alembic upgrade head

            # Чистим старые образы
            docker image prune -f

            echo "Deploy finished at $(date)"
