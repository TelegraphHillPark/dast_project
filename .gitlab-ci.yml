stages:
  - lint
  - sast
  - test
  - build
  - trivy
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  PYTHON_VERSION: "3.11"

# ── LINT ──────────────────────────────────────────────────────────────────────
lint:backend:
  stage: lint
  image: python:3.11-slim
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths: [.pip-cache]
  before_script:
    - pip install --cache-dir .pip-cache flake8 mypy black isort
    - pip install --cache-dir .pip-cache -r backend/requirements.txt
  script:
    - flake8 backend/app --max-line-length=120 --statistics
    - mypy backend/app --ignore-missing-imports
  rules:
    - changes: ["backend/**/*"]

lint:frontend:
  stage: lint
  image: node:20-alpine
  cache:
    key: npm-$CI_COMMIT_REF_SLUG
    paths: [frontend/node_modules]
  before_script:
    - cd frontend && npm ci
  script:
    - npm run lint
  rules:
    - changes: ["frontend/**/*"]

# ── SAST ──────────────────────────────────────────────────────────────────────
sast:sonarqube:
  stage: sast
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: 0
  cache:
    key: sonar-$CI_COMMIT_REF_SLUG
    paths: [.sonar/cache]
  script:
    - sonar-scanner
        -Dsonar.projectKey=$SONAR_PROJECT_KEY
        -Dsonar.sources=backend,frontend/src
        -Dsonar.host.url=$SONAR_HOST_URL
        -Dsonar.token=$SONAR_TOKEN
  only:
    - main
    - merge_requests

# ── TEST ──────────────────────────────────────────────────────────────────────
test:backend:
  stage: test
  image: python:3.11-slim
  services:
    - name: postgres:16-alpine
      alias: db
      variables:
        POSTGRES_DB: dast_test
        POSTGRES_USER: dast
        POSTGRES_PASSWORD: testpassword
    - name: redis:7-alpine
      alias: redis
  variables:
    DATABASE_URL: "postgresql+asyncpg://dast:testpassword@db:5432/dast_test"
    REDIS_URL: "redis://redis:6379/0"
    SECRET_KEY: "ci-test-secret-key-32chars-minimum"
    ENVIRONMENT: "development"
  before_script:
    - pip install -r backend/requirements.txt
  script:
    - cd backend
    - pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
  rules:
    - changes: ["backend/**/*"]

# ── BUILD ─────────────────────────────────────────────────────────────────────
build:docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG -t $IMAGE_LATEST ./backend
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  only:
    - tags

# ── TRIVY ─────────────────────────────────────────────────────────────────────
trivy:scan:
  stage: trivy
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL $IMAGE_TAG
  allow_failure: false
  needs: [build:docker]
  only:
    - tags

# ── DEPLOY ────────────────────────────────────────────────────────────────────
deploy:staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - ssh $DEPLOY_USER@$DEPLOY_HOST
        "cd $DEPLOY_PATH &&
         docker compose pull &&
         docker compose up -d --remove-orphans &&
         docker compose exec backend alembic upgrade head"
  environment:
    name: staging
    url: https://$DEPLOY_HOST
  needs: [trivy:scan]
  only:
    - tags
