# Production docker-compose
# Использование:
#   cp .env.example .env.prod
#   nano .env.prod          # заполни реальные значения
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: dast_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dast}
      POSTGRES_USER: ${POSTGRES_USER:-dast}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dast_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dast} -d ${POSTGRES_DB:-dast}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dast_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - dast_internal
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dast_backend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /run
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dast}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-dast}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ENVIRONMENT: production
      FRONTEND_URL: ${FRONTEND_URL}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPYCACHEPREFIX: /tmp/pycache
    volumes:
      - uploads_data:/app/uploads
      - wordlists_data:/app/wordlists
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dast_internal
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Scan worker ──────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dast_worker
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /run
    command: python -m app.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dast}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-dast}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPYCACHEPREFIX: /tmp/pycache
    volumes:
      - wordlists_data:/app/wordlists
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - dast_internal

  # ── Nginx (фронт + reverse proxy) ────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: dast_nginx
    restart: unless-stopped
    environment:
      # Если домена нет — ставь белый IP или IP.nip.io
      # Например: DOMAIN=1.2.3.4  или  DOMAIN=1.2.3.4.nip.io
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Let's Encrypt сертификаты (certbot пишет сюда, nginx читает)
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dast_internal
      - dvwa_net

  # ── Certbot (обновление Let's Encrypt) ───────────────────────────────────────
  # Используется только если у тебя есть домен или nip.io
  certbot:
    image: certbot/certbot:latest
    container_name: dast_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Автообновление раз в 12 часов
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    networks:
      - dast_internal

  # ── DVWA (уязвимое веб-приложение для тестирования DAST) ─────────────────────
  dvwa_db:
    image: mariadb:10.11
    container_name: dvwa_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DVWA_DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: dvwa
      MYSQL_USER: dvwa
      MYSQL_PASSWORD: ${DVWA_DB_PASSWORD:-dvwapass}
    volumes:
      - dvwa_db_data:/var/lib/mysql
    networks:
      - dvwa_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  dvwa:
    image: ghcr.io/digininja/dvwa:latest
    container_name: dvwa
    restart: unless-stopped
    environment:
      DB_SERVER: dvwa_db
      DB_DATABASE: dvwa
      DB_USER: dvwa
      DB_PASSWORD: ${DVWA_DB_PASSWORD:-dvwapass}
    ports:
      - "8888:80"   # доступен на http://<VDS-IP>:8888
    depends_on:
      dvwa_db:
        condition: service_healthy
    networks:
      - dvwa_net

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  wordlists_data:
  certbot_certs:
  certbot_www:
  dvwa_db_data:

networks:
  dast_internal:
    driver: bridge
  dvwa_net:
    driver: bridge
